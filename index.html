<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Sanctuary for You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #fce4ec;
            --hot-pink: #ff80ab;
            --yellow: #fff9c4;
            --gold: #fbc02d;
            --text: #880e4f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--pink), var(--yellow), #f8bbd0);
            background-size: 400% 400%;
            animation: flow 15s ease infinite;
        }

        @keyframes flow { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        /* Floating Love Rain */
        .heart-particle {
            position: absolute; color: var(--hot-pink);
            opacity: 0.3; pointer-events: none;
            animation: floatUp 6s linear infinite;
        }
        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        .viewport {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* The Starfishy Hub */
        .star-hub {
            font-size: 100px; cursor: pointer;
            filter: drop-shadow(0 0 20px var(--hot-pink));
            animation: breathing 3s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes breathing {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--hot-pink)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--gold)); }
        }

        .display-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-radius: 30px; border: 2px solid white;
            padding: 30px; width: 85%; max-width: 500px;
            text-align: center; margin-top: 20px;
            box-shadow: 0 15px 35px rgba(255, 128, 171, 0.2);
        }

        .main-msg { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--text); }

        /* The Mood Dock */
        .mood-dock {
            position: absolute; bottom: 40px;
            display: flex; gap: 15px; width: 100%;
            justify-content: center; padding: 0 20px;
        }
        .mood-btn {
            background: white; border: none; padding: 12px;
            border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 0.8rem; color: var(--text); font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .mood-btn:active { transform: scale(0.9); background: var(--hot-pink); color: white; }

        /* Secret Corner Buttons */
        .corner-btn {
            position: absolute; font-size: 1.5rem; opacity: 0.6; cursor: pointer; padding: 15px;
        }
        .tl { top: 10px; left: 10px; } .tr { top: 10px; right: 10px; }
        .bl { bottom: 120px; left: 10px; } .br { bottom: 120px; right: 10px; }

    </style>
</head>
<body>

    <div id="bg-elements"></div>

    <div class="viewport">
        <div class="corner-btn tl" onclick="alert('You are my first thought every morning. ☀️')">🌸</div>
        <div class="corner-btn tr" onclick="alert('I am so lucky to be yours. 💍')">✨</div>
        <div class="corner-btn bl" onclick="alert('You make me want to be a better man. ❤️')">☁️</div>
        <div class="corner-btn br" onclick="alert('I love you more than all the stars. 🌌')">🌙</div>

        <div class="star-hub" onclick="sparkleLove()">⭐</div>

        <div class="display-card">
            <div id="text-out" class="main-msg">Hey beautiful... touch my heart.</div>
        </div>

        <div class="mood-dock">
            <button class="mood-btn" onclick="moodMsg('sad')">I'm Sad</button>
            <button class="mood-btn" onclick="moodMsg('anxious')">I'm Overwhelmed</button>
            <button class="mood-btn" onclick="moodMsg('tired')">I'm Tired</button>
            <button class="mood-btn" onclick="moodMsg('happy')">I'm Happy</button>
        </div>
    </div>

    <script>
        const textOut = document.getElementById('text-out');
        const bg = document.getElementById('bg-elements');

        // 1. Create Floating Background Hearts
        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart-particle';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 4) + 's';
            bg.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }
        setInterval(createHeart, 500);

        // 2. Mood Logic
        const moods = {
            sad: "Come here... *hugs you tight*. I'm not letting go until you feel better.",
            anxious: "Breathe with me, Starfishy's girl. One... two... three. I've got you.",
            tired: "You've worked so hard. Rest your head, I'm right here guarding your dreams.",
            happy: "Your smile is my favorite thing in the whole world! Keep shining!"
        };
        function moodMsg(m) {
            textOut.style.opacity = 0;
            setTimeout(() => { textOut.innerText = moods[m]; textOut.style.opacity = 1; }, 300);
        }

        // 3. Main Sparkle Logic
        const quotes = [
            "I love you endlessly.", "You are my favorite human.",
            "Always your Starfishy. 🌊", "You are so precious to me.",
            "My heart belongs to you.", "You are my sun and my moon."
        ];
        function sparkleLove() {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            textOut.innerText = q;
            for(let i=0; i<15; i++) createHeart(); // Burst on click!
        }
    </script>
</body>
</html>
