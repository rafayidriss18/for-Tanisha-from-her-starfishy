<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Favorite Person</title>
    <style>
        :root {
            --baby-pink: #fce4ec;
            --light-yellow: #fff9c4;
            --deep-pink: #f06292;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevent clunky scrolling */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--baby-pink), var(--light-yellow));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* The Starfishy Pulse */
        .starfishy-core {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 50%; /* We can replace this with an SVG starfish later! */
            box-shadow: 0 0 50px rgba(240, 98, 146, 0.5);
            animation: pulse 4s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .message {
            margin-top: 40px;
            color: #d81b60;
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.4;
            transition: opacity 1s ease;
        }

        .tap-zone {
            position: absolute;
            bottom: 10%;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            border: 1px solid white;
            color: var(--deep-pink);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container" onclick="nextMessage()">
    <div class="starfishy-core">⭐</div>
    <div id="text-box" class="message">
        Tap anywhere to feel the love...
    </div>
    <div class="tap-zone">Press for a hug</div>
</div>

<script>
    const messages = [
        "Take a deep breath... I'm right here.",
        "You are my favorite thought.",
        "I love being your Starfishy. Always clinging to you.",
        "You make my world a lot brighter just by being in it.",
        "Need a hug? Consider this a digital one.",
        "You're doing so well. I'm proud of you."
    ];

    let index = 0;
    function nextMessage() {
        const box = document.getElementById('text-box');
        box.style.opacity = 0;
        setTimeout(() => {
            index = (index + 1) % messages.length;
            box.innerText = messages[index];
            box.style.opacity = 1;
        }, 500);
    }
</script>

</body>
</html>
