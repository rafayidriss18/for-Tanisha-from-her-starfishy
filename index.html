<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Private Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ffdae9;
            --deep-pink: #ff4081;
            --soft-yellow: #fffde7;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden; font-family: 'Quicksand', sans-serif;
            background: linear-gradient(180deg, var(--soft-yellow) 0%, var(--pink) 100%);
            scroll-behavior: smooth;
        }

        /* 1. Floating Hearts Background */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .main-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; min-height: 100vh;
        }

        /* 2. The Starfishy Heartbeat */
        .hero-section { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .pulse-container {
            position: relative; width: 200px; height: 200px;
            display: flex; align-items: center; justify-content: center;
        }
        .ring {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--deep-pink); border-radius: 50%;
            animation: pulse 2s infinite; opacity: 0;
        }
        @keyframes pulse {
            0% { transform: scale(0.7); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .starfishy { font-size: 100px; z-index: 5; filter: drop-shadow(0 0 20px var(--deep-pink)); cursor: pointer; }

        /* 3. The Message Board */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.6); border-radius: 30px;
            padding: 30px; width: 90%; max-width: 450px; text-align: center;
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .love-note-text { font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ad1457; margin-bottom: 10px; }

        /* 4. The Response Box (New!) */
        .response-box { width: 100%; margin-top: 20px; }
        textarea {
            width: 100%; background: rgba(255,255,255,0.5); border: 2px solid white;
            border-radius: 15px; padding: 15px; font-family: 'Quicksand';
            resize: none; color: #ad1457; outline: none;
        }
        .send-btn {
            background: var(--deep-pink); color: white; border: none;
            padding: 10px 25px; border-radius: 20px; font-weight: bold;
            margin-top: 10px; cursor: pointer; transition: 0.3s;
        }
        .send-btn:active { transform: scale(0.9); }

        /* 5. Ticking Timer */
        .timer { font-size: 0.8rem; font-weight: 700; color: #d81b60; letter-spacing: 1px; }

    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="main-container">
    
    <div class="hero-section">
        <div class="pulse-container" onclick="showRandomMsg()">
            <div class="ring"></div>
            <div class="ring" style="animation-delay: 0.5s;"></div>
            <div class="starfishy">⭐</div>
        </div>
        <h1 style="font-family: 'Dancing Script'; color: #ad1457; margin-top: 20px;">I Love You, Forever.</h1>
        <div class="timer" id="timer">Calculating our love...</div>
    </div>

    <div class="glass-card">
        <div id="love-display" class="love-note-text">Tap my heart above...</div>
        <p style="font-size: 0.9rem; color: #d81b60;">You're my favorite human.</p>
    </div>

    <div class="glass-card">
        <h3 style="color: #ad1457; margin: 0 0 10px 0;">Leave a note for Starfishy</h3>
        <div class="response-box">
            <textarea id="reply" rows="3" placeholder="Write something sweet..."></textarea>
            <button class="send-btn" onclick="sendLove()">Send to My Starfishy ❤️</button>
        </div>
        <div id="confirm" style="display:none; color: #4caf50; margin-top:10px; font-weight:bold;">Sent to his heart! ✓</div>
    </div>

</div>

<script>
    // Timer Logic
    const startDate = new Date('2023-10-08'); // EDIT THIS TO YOUR DATE
    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('timer').innerText = `${days} DAYS OF US`;
    }
    setInterval(updateTimer, 1000); updateTimer();

    // Message Logic
    const messages = [
        "I love you more than all the stars.",
        "You're the best thing that ever happened to me.",
        "I'm always clinging to you, no matter what.",
        "Breathe. I'm right here with you.",
        "You are so incredibly beautiful, inside and out.",
        "I'm so proud of you, my love."
    ];

    function showRandomMsg() {
        const display = document.getElementById('love-display');
        display.style.opacity = 0;
        setTimeout(() => {
            display.innerText = messages[Math.floor(Math.random() * messages.length)];
            display.style.opacity = 1;
        }, 300);
    }

    // Response Logic
    function sendLove() {
        const text = document.getElementById('reply').value;
        if(text.trim() === "") return;
        
        // This will open her email app with the message pre-filled to you!
        // Replace 'your-email@gmail.com' with your real email.
        window.location.href = `mailto:rafayidriss18@gmail.com?subject=A Note For My Starfishy&body=${encodeURIComponent(text)}`;
        
        document.getElementById('confirm').style.display = 'block';
        document.getElementById('reply').value = '';
    }

    // Background Hearts
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let hearts = [];
    function createHeart() {
        hearts.push({
            x: Math.random() * canvas.width,
            y: canvas.height + 20,
            size: Math.random() * 15 + 10,
            speed: Math.random() * 2 + 1,
            opacity: Math.random() * 0.5 + 0.2
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hearts.forEach((h, i) => {
            h.y -= h.speed;
            ctx.globalAlpha = h.opacity;
            ctx.font = `${h.size}px serif`;
            ctx.fillText('💗', h.x, h.y);
            if(h.y < -20) hearts.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    setInterval(createHeart, 400);
    animate();
</script>

</body>
</html>
